<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog & Nieuws — VPNkenner.nl</title>
  <meta name="description" content="VPN tips, vergelijkingen en het laatste nieuws van VPNkenner.nl." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
    header a.logo { color: #fff; font-size: 20px; font-weight: 700; text-decoration: none; }
    nav a { color: #94a3b8; text-decoration: none; margin-left: 20px; font-size: 14px; }
    nav a:hover { color: #fff; }
    .hero { background: linear-gradient(135deg, #1e40af, #3b82f6); padding: 60px 20px; text-align: center; }
    .hero h1 { font-size: 36px; font-weight: 800; color: #fff; margin-bottom: 12px; }
    .hero p { color: #bfdbfe; font-size: 16px; }
    .container { max-width: 960px; margin: 0 auto; padding: 40px 20px; }
    #artikel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
    .artikel-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; text-decoration: none; color: inherit; display: block; transition: border-color 0.2s, transform 0.2s; }
    .artikel-card:hover { border-color: #3b82f6; transform: translateY(-3px); }
    .artikel-datum { font-size: 12px; color: #64748b; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .artikel-titel { font-size: 17px; font-weight: 700; color: #f1f5f9; margin-bottom: 10px; line-height: 1.4; }
    .artikel-lees { font-size: 13px; color: #3b82f6; font-weight: 600; }
    .loading { text-align: center; padding: 60px; color: #64748b; }
    footer { background: #1e293b; text-align: center; padding: 24px; color: #475569; font-size: 14px; margin-top: 60px; }
    footer a { color: #475569; text-decoration: none; margin: 0 12px; }
  </style>
</head>
<body>
<header>
  <a class="logo" href="/">VPNkenner.nl</a>
  <nav>
    <a href="/">Home</a>
    <a href="/blog.html">Blog</a>
    <a href="/over-ons.html">Over ons</a>
  </nav>
</header>
<div class="hero">
  <h1>Blog & Nieuws</h1>
  <p>VPN tips, vergelijkingen en het laatste nieuws — elke week nieuw</p>
</div>
<div class="container">
  <div id="artikel-grid"><div class="loading">Artikelen laden...</div></div>
</div>
<footer>
  <p>© 2026 VPNkenner.nl</p>
  <p style="margin-top:8px"><a href="/privacy.html">Privacy</a><a href="/over-ons.html">Over ons</a></p>
</footer>
<script>
async function laadArtikelen() {
  const grid = document.getElementById('artikel-grid');
  try {
    const resp = await fetch('https://api.github.com/repos/guydeoncrul-ux/vpnkenner-site/contents/artikelen');
    const bestanden = await resp.json();
    const htmlBestanden = bestanden
      .filter(f => f.name.endsWith('.html') && f.name.startsWith('vpn-artikel'))
      .sort((a, b) => b.name.localeCompare(a.name));

    if (htmlBestanden.length === 0) {
      grid.innerHTML = '<div class="loading">Nog geen artikelen — binnenkort verschijnen hier de eerste VPN-tips!</div>';
      return;
    }

    const kaarten = await Promise.all(htmlBestanden.map(async (bestand) => {
      let titel = bestand.name.replace('vpn-artikel-', '').replace('.html', '').replace(/-/g, ' ');
      let datum = '';
      const datumMatch = bestand.name.match(/(\d{4})-(\d{2})-(\d{2})/);
      if (datumMatch) {
        const d = new Date(`${datumMatch[1]}-${datumMatch[2]}-${datumMatch[3]}`);
        datum = d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
      }
      try {
        const raw = await fetch(`https://raw.githubusercontent.com/guydeoncrul-ux/vpnkenner-site/main/artikelen/${bestand.name}`);
        const html = await raw.text();
        const match = html.match(/<title>(.*?)\s*\|?\s*VPNkenner\.nl<\/title>/i) || html.match(/<h1[^>]*>(.*?)<\/h1>/i);
        if (match) titel = match[1].trim();
      } catch(e) {}
      return { titel, datum, url: `/artikelen/${bestand.name}` };
    }));

    grid.innerHTML = kaarten.map(k => `
      <a class="artikel-card" href="${k.url}">
        <div class="artikel-datum">${k.datum}</div>
        <div class="artikel-titel">${k.titel}</div>
        <div class="artikel-lees">Lees artikel →</div>
      </a>`).join('');
  } catch(e) {
    grid.innerHTML = '<div class="loading">Artikelen tijdelijk niet beschikbaar.</div>';
  }
}
laadArtikelen();
</script>
</body>
</html>
